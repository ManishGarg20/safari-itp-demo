<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Safari ITP Demo Probe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f9; padding: 1rem; font-size: 13px; }
    .card { background: #fff; border-radius: 8px; padding: 1rem; box-shadow: 0 1px 6px rgba(0,0,0,0.1); }
    h3 { color: #032d60; margin-bottom: 0.5rem; font-size: 14px; }
    .row { margin: 0.3rem 0; }
    .val-true  { color: #2e7d32; font-weight: 700; }
    .val-false { color: #c62828; font-weight: 700; }
    .log { background: #1e1e1e; color: #d4d4d4; padding: 0.5rem; border-radius: 4px; font-size: 11px; font-family: monospace; margin-top: 0.5rem; white-space: pre-wrap; word-break: break-all; }
    .step { background: #e8f0fe; border-left: 3px solid #0176d3; padding: 0.75rem 1rem; border-radius: 0 4px 4px 0; margin: 0.75rem 0; }
    button { margin-top: 0.75rem; padding: 0.4rem 1rem; background: #0176d3; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
  </style>
</head>
<body>
<div class="card" id="root"><p>Loading...</p></div>

<script>
  const COOKIE_NAME = 'demo_auth';
  const SOURCE_ID   = 'safari-itp-demo';
  const log         = [];

  function addLog(msg) {
    const ts = new Date().toISOString().substr(11, 12);
    const line = `[${ts}] ${msg}`;
    log.push(line);
    console.log('[safari-probe]', line);
    const el = document.getElementById('probe-log');
    if (el) el.textContent = log.join('\n');
  }

  function getCookie(name) {
    return document.cookie.split(';').some(c => c.trim().startsWith(name + '='));
  }

  function detectBrowser() {
    const ua = navigator.userAgent;
    if (/Safari/.test(ua) && !/Chrome/.test(ua)) return 'Safari';
    if (/Chrome/.test(ua) || /Chromium/.test(ua)) return 'Chrome/Chromium';
    return 'Other';
  }

  // Try to post to a window target and log the result
  function tryPost(target, targetName, payload) {
    try {
      target.postMessage(payload, '*');
      addLog(`postMessage → ${targetName}: OK`);
    } catch (e) {
      addLog(`postMessage → ${targetName}: FAILED — ${e.message}`);
    }
  }

  // Send message to all possible parent windows
  function broadcastToParents(payload) {
    addLog('Broadcasting postMessage to all parent frames...');

    // window.parent — direct parent frame
    if (window.parent && window.parent !== window) {
      tryPost(window.parent, 'window.parent', payload);
    } else {
      addLog('window.parent === window (we are top — not in iframe?)');
    }

    // window.top — top-most frame
    if (window.top && window.top !== window && window.top !== window.parent) {
      tryPost(window.top, 'window.top', payload);
    } else if (window.top && window.top !== window) {
      addLog('window.top === window.parent (no intermediate frames)');
    }

    // Walk up the chain (in case of multiple nested frames)
    try {
      let current = window.parent;
      let depth = 1;
      while (current && current !== current.parent && depth < 5) {
        tryPost(current.parent, `window.parent(x${depth + 1})`, payload);
        current = current.parent;
        depth++;
      }
    } catch(e) {
      addLog(`Frame walk stopped: ${e.message}`);
    }
  }

  const inIframe = (() => {
    try { return window.self !== window.top; } catch(e) { return true; }
  })();

  const browser     = detectBrowser();
  const allCookies  = document.cookie;
  const hasAuth     = getCookie(COOKIE_NAME);

  addLog(`Page loaded. inIframe=${inIframe}, browser=${browser}`);
  addLog(`Cookies: "${allCookies || '(none)'}"`);
  addLog(`hasAuth cookie: ${hasAuth}`);

  if (inIframe) {
    // ── IFRAME MODE: post auth result back and keep retrying ──────────────

    const payload = {
      source: SOURCE_ID,
      authenticated: hasAuth,
      cookiesVisible: allCookies || '(none)',
      browser: browser
    };

    // Initial send
    broadcastToParents(payload);

    // Retry every 3 seconds in case the LWC listener wasn't ready
    let retries = 0;
    const interval = setInterval(() => {
      retries++;
      addLog(`Retry #${retries} — re-broadcasting postMessage`);
      broadcastToParents(payload);
      if (retries >= 5) {
        clearInterval(interval);
        addLog('Max retries reached. If LWC still shows no message, the Salesforce window listener cannot receive cross-origin postMessages.');
      }
    }, 3000);

    document.getElementById('root').innerHTML = `
      <h3>Probe — Iframe Mode</h3>
      <div class="row">Authenticated: <span class="${hasAuth ? 'val-true' : 'val-false'}">${hasAuth ? 'YES ✓' : 'NO ✗'}</span></div>
      <div class="row">Browser: <strong>${browser}</strong></div>
      <div class="row">Cookies: <code>${allCookies || '(none)'}</code></div>
      <div class="row">PostMessage log:</div>
      <div class="log" id="probe-log"></div>
    `;
    // Re-attach log element after innerHTML reset
    log.forEach(l => {}); // keep existing log entries
    const logEl = document.getElementById('probe-log');
    if (logEl) logEl.textContent = log.join('\n');

  } else {
    // ── DIRECT VISIT MODE: set the cookie ──────────────────────────────────

    const expiry = new Date(Date.now() + 24 * 60 * 60 * 1000).toUTCString();
    try {
      document.cookie = `${COOKIE_NAME}=true; path=/; expires=${expiry}; SameSite=None; Secure`;
      addLog('Cookie set attempt done');
    } catch(e) {
      addLog(`Cookie set failed: ${e.message}`);
    }
    const cookieSet = getCookie(COOKIE_NAME);
    addLog(`Cookie set result: ${cookieSet}`);

    document.getElementById('root').innerHTML = `
      <h3>Safari ITP Demo &mdash; Direct Visit</h3>
      <div class="step">
        <strong>Step 1:</strong> Cookie set: <span class="${cookieSet ? 'val-true' : 'val-false'}">${cookieSet ? 'YES ✓' : 'FAILED (needs HTTPS)'}</span><br>
        Current cookies: <code>${document.cookie || '(empty)'}</code>
      </div>
      <div class="step">
        <strong>Step 2:</strong> Go back to Salesforce → open <strong>iframeSafariDemo</strong> component → click <em>Check Again</em>.<br><br>
        Chrome → <span class="val-true">YES ✓</span> &nbsp; Safari → <span class="val-false">NO ✗</span>
      </div>
      <div class="log" id="probe-log">${log.join('\n')}</div>
      <button onclick="location.reload()">Re-check Cookie</button>
    `;
  }
</script>
</body>
</html>
